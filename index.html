<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Safety</title>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main id="app">

        <section class="page active">
            <h1>Tourist Safety</h1>
            <p>Your Offline Safety Companion</p>
        </section>

    </main>

    <nav class="dock">

        <button class="dock-btn active">
            <i class="ri-home-5-line"></i>
            <span>Home</span>
        </button>

        <button class="dock-btn">
            <i class="ri-map-pin-line"></i>
            <span>Maps</span>
        </button>

        <div class="dock-center">

            <button class="sos-btn">
                <i class="ri-alarm-warning-fill"></i>
            </button>

        </div>

        <button class="dock-btn emergency-btn">
            <i class="ri-first-aid-kit-line"></i>
            <span>Emergency</span>
        </button>

        <button class="dock-btn">
            <i class="ri-translate-2"></i>
            <span>Language</span>
        </button>

    </nav>

    <div class="emergency-menu">

        <button>🚨 SOS</button>

        <button>🩹 First Aid</button>

        <button>☎ Emergency Contacts</button>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
