<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Language - Tourist Safety</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#eef2f7;
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:120px; /* space for dock */
}

/* ================= PAGE WRAPPER ================= */
.wrapper{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.header{
  margin:10px 0 18px;
}

.header h1{
  font-size:22px;
  color:#111827;
}

.header p{
  font-size:13px;
  color:#6b7280;
  margin-top:4px;
}

/* ================= LANGUAGE CARDS ================= */
.card{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:10px;
  color:#111827;
}

/* buttons */
.phrase-btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:#f3f4f6;
  font-size:14px;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
  color:#111827;
}

.phrase-btn:hover{
  background:#e5e7eb;
  transform:scale(1.01);
}

/* ================= POPUP ================= */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-box{
  width:92%;
  max-width:420px;
  background:white;
  border-radius:18px;
  padding:20px;
  text-align:center;
  animation:pop 0.18s ease;
  box-shadow:0 25px 60px rgba(0,0,0,0.3);
}

@keyframes pop{
  from{transform:scale(0.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* native text */
.native{
  font-size:16px;
  color:#111827;
  font-weight:600;
}

/* arrow */
.arrow{
  margin:12px 0;
  font-size:18px;
  color:#9ca3af;
}

/* nepali result highlight */
.result-box{
  background:linear-gradient(135deg,#10b981,#059669);
  color:white;
  padding:18px;
  border-radius:14px;
  margin-top:10px;
}

.result-label{
  font-size:11px;
  opacity:0.9;
}

.result-text{
  font-size:22px;
  font-weight:800;
  margin-top:6px;
}

/* close button */
.close-btn{
  margin-top:14px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
  cursor:pointer;
}

/* ================= DOCK (COPY EXACT INDEX STYLE) ================= */
.dock{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:min(95%,500px);
    height:78px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(18px);
    border-radius:30px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
    z-index: 10;
}

.dock-btn{
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    color:#555;
    transition:.3s;
    text-decoration:none;
}

.dock-btn i{
    font-size:25px;
}

.dock-btn span{
    font-size:11px;
    margin-top:4px;
}

.dock-btn:hover{
    transform:translateY(-8px) scale(1.12);
    color:#0077ff;
}

.active{
    color:#0077ff;
}

/* SOS FIX */
.sos-btn{
    width:68px;
    height:68px;
    border:none;
    border-radius:50%;
    background:#ff2d55;
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 30px rgba(255,0,0,.45);
}

.sos-btn:hover{
    transform:scale(1.15);
    box-shadow:0 0 25px red;
}
</style>
</head>

<body>

<div class="wrapper">
<h2>Text To Speech</h2><br><br><br>
  <div class="header">
    <h1>Language Assistant</h1>
    <p>Tap a phrase to see Nepali translation (Romanized)</p>
  </div>


  <!-- ENGLISH -->
  <div class="card">
    <div class="card-title">English</div>

    <button class="phrase-btn" onclick="openPopup('I need help', 'malai madat chahiyo')">I need help</button>
    <button class="phrase-btn" onclick="openPopup('Where is hospital?', 'hospital kata cha?')">Where is hospital?</button>
    <button class="phrase-btn" onclick="openPopup('Call police', 'police bolaunus')">Call police</button>
    <button class="phrase-btn" onclick="openPopup('I am lost', 'ma haraye')">I am lost</button>
  </div>

  <!-- HINDI -->
  <div class="card">
    <div class="card-title">Hindi</div>

    <button class="phrase-btn" onclick="openPopup('मुझे मदद चाहिए', 'malai madat chahiyo')">मुझे मदद चाहिए</button>
    <button class="phrase-btn" onclick="openPopup('अस्पताल कहाँ है?', 'hospital kata cha?')">अस्पताल कहाँ है?</button>
    <button class="phrase-btn" onclick="openPopup('पानी चाहिए', 'malai pani chahiyo')">पानी चाहिए</button>
  </div>

  <!-- MAITHILI -->
  <div class="card">
    <div class="card-title">Maithili</div>

    <button class="phrase-btn" onclick="openPopup('हमर मदत चाही', 'malai madat chahiyo')">हमर मदत चाही</button>
    <button class="phrase-btn" onclick="openPopup('अस्पताल कत अछि?', 'hospital kata cha?')">अस्पताल कत अछि?</button>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup(event)">
  <div class="popup-box">

    <div class="native" id="nativeText"></div>

    <div class="arrow">↓</div>

    <div class="result-box">
      <div class="result-label">Nepali (Romanized)</div>
      <div class="result-text" id="nepaliText"></div>
    </div>

    <button class="close-btn" onclick="closePopup()">Close</button>

  </div>
</div>

<!-- DOCK -->
<nav class="dock">

  <a href="index.html" class="dock-btn">
    <i class="ri-home-5-line"></i>
    <span>Home</span>
  </a>

  <a href="map.html" class="dock-btn">
    <i class="ri-map-pin-line"></i>
    <span>Maps</span>
  </a>

  <button class="sos-btn">
    <i class="ri-alarm-warning-fill"></i>
  </button>

  <a href="emergency.html" class="dock-btn">
    <i class="ri-first-aid-kit-line"></i>
    <span>Emergency</span>
  </a>

  <a href="language.html" class="dock-btn active">
    <i class="ri-translate-2"></i>
    <span>Language</span>
  </a>

</nav>

<script>
function openPopup(native, nepali){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("nativeText").innerText = native;
  document.getElementById("nepaliText").innerText = nepali;
}

function closePopup(e){
  if(!e || e.target.id === "popup"){
    document.getElementById("popup").style.display = "none";
  }
}
</script>

</body>
</html>
